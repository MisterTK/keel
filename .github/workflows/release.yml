# Release pipeline — build always; publish only when explicitly asked.
#
# Produces every artifact docs/sprint-plan.md's release-candidate line
# promises (wheels macOS/Linux x86-64/aarch64, npm package, CLI binaries,
# brew formula draft) plus the CLI/Windows/musl legs architecture-spec's NFR5
# adds, attaches them all to a DRAFT GitHub Release, and stops there — on a
# plain `vX.Y.Z` tag push, nothing in this file talks to a real registry.
#
# Real publishing is a SEPARATE, explicit act: dispatch this workflow against
# the release tag with `publish: true` and the `publish-pypi-keelrun-core`/
# `publish-pypi-keelrun-cli`/`publish-pypi-keelrun`/`publish-npm` jobs run for
# real — PyPI via Trusted Publishing (OIDC, one environment per project, see
# those jobs' own comment for why), npm via the stored `NPM_TOKEN` secret.
# crates.io is excluded from this workflow entirely and stays a manual local
# `cargo publish` (see `cargo-publish-dry-run`'s comment for why) — nothing
# here ever touches crates.io.
#
# Triggers on `vX.Y.Z` tags (the version MUST already match every manifest —
# scripts/check-versions.py --tag is the gate) and on workflow_dispatch for
# dry runs against any branch (no tag-version check in that mode).
#
# Local verification of the pieces this workflow automates (see also
# scripts/check-release-metadata.sh --full, which several jobs below run
# verbatim):
#
#   actionlint .github/workflows/release.yml
#   PATH="$HOME/.rustup/toolchains/1.97.1-aarch64-apple-darwin/bin:$PATH" \
#     maturin build --release -m crates/keel-py/Cargo.toml -o dist   # native wheel
#   maturin build --release -m crates/keel-cli/Cargo.toml -o dist    # CLI wheel
#   uvx --from ./dist/keelrun_cli-*.whl keel --help                 # uvx entrypoint
#   (cd node/keel && npm pack) && ...                                # npm tarball
#   ruby -c packaging/homebrew/keel.rb                                # brew draft
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: >-
          Actually publish to PyPI (OIDC Trusted Publishing, publish-pypi-*
          jobs) and npm (stored NPM_TOKEN, publish-npm job) — real, working
          steps, not a placeholder. Must be dispatched explicitly against a
          release tag; a plain tag push only builds artifacts and drafts a
          GitHub release. crates.io is not gated by this input at all — it
          is published manually (`cargo publish`), deliberately, since
          CARGO_REGISTRY_TOKEN is a local-only credential, never a CI secret.
        type: boolean
        default: false

# One release build per ref at a time; never cancel one mid-upload.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege by default; only the job that files the GitHub Release
# elevates to `contents: write`.
permissions:
  contents: read

env:
  # rustup's own toolchain (pinned by rust-toolchain.toml) is what every
  # `rustup toolchain install` step below activates; unlike the maintainer's
  # local machine this repo's CI runners have no conflicting Homebrew cargo
  # ahead of it on PATH, so no PATH surgery is needed here (contrast
  # CLAUDE.md's local-dev note).
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Gate: the tag (if any) matches every version declaration, and the cheap
  # release-metadata invariants (vendored copies, cargo package listings,
  # manifest shape) hold. Every other job depends on this.
  # ---------------------------------------------------------------------------
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        # `rustup toolchain install` only makes 1.97.1 the override for THIS
        # directory (rust-toolchain.toml). That's not enough for any cargo
        # invocation that happens outside the checked-out repo tree — e.g.
        # npm-pack-root's `check-release-metadata.sh --full` pip-installs a
        # maturin sdist, which pip extracts and builds from /tmp/pip-req-build-*,
        # a directory with no rust-toolchain.toml of its own. Without an
        # explicit `rustup default`, that build fell back to whatever
        # rustup's machine-wide default was (1.96.1 on this runner image) and
        # failed keel-core-api/keel-journal/keelrun-core's `rust-version =
        # "1.97"` gate — hit for real running v0.1.0's release build
        # (2026-07-14). Setting the default explicitly closes that gap
        # everywhere, not just for known-affected jobs.
        run: |
          rustup toolchain install
          rustup default "$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
      - name: Assert tag matches every version declaration
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: python3 scripts/check-versions.py --tag "$TAG"
      - name: Release-metadata invariants (cheap mode)
        run: bash scripts/check-release-metadata.sh
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 1a. keel_core wheels (PyO3/abi3, one wheel per platform — see
  # crates/keel-py/pyproject.toml's abi3-py311 feature) + a source distribution.
  # rusqlite's `bundled` feature (crates/keel-journal) statically compiles
  # SQLite, so there is no manylinux system-library problem in this matrix.
  #
  # macOS: GitHub no longer offers a free Intel (x86_64) runner, so both
  # macOS legs run on the same arm64 `macos-14` box — aarch64-apple-darwin
  # natively, x86_64-apple-darwin cross-compiled via `rustup target add`
  # (Xcode's linker/SDK support this without a separate toolchain; Rosetta 2,
  # preinstalled on these runners, is only needed to *run* the result, which
  # is why its import smoke below is skipped rather than Rosetta-wrapped).
  #
  # Windows: `windows-latest` builds x86_64-pc-windows-msvc natively (no
  # cross-compilation, no manylinux concept) — same target `cli-binaries`
  # already uses for the CLI archive. Added 2026-07-14: Windows is now a
  # supported wheel platform, not just a raw CLI binary (local memory:
  # keel-windows-support-added).
  # ---------------------------------------------------------------------------
  wheels-core:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            smoke: true # native to the runner
          - os: macos-14
            target: x86_64-apple-darwin
            smoke: false # cross-compiled; importing into the arm64 python would mis-match arch
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            smoke: true # native to the runner
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
            smoke: false # cross-compiled under QEMU; not worth the emulated python cost here
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            smoke: true # native to the runner
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (linux/aarch64 cross build)
        if: runner.os == 'Linux' && matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build wheel (keel_core)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist -m crates/keel-py/Cargo.toml
      - name: Install + import smoke (native-arch legs only)
        if: matrix.smoke && matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv-smoke
          .venv-smoke/bin/pip install --quiet --disable-pip-version-check dist/keelrun_core-*.whl
          .venv-smoke/bin/python -c 'import keel_core; c = keel_core.KeelCore(); c.configure({}); print("keel_core import OK:", c.report())'
      - name: Install + import smoke (Windows)
        if: matrix.smoke && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          python3 -m venv .venv-smoke
          $wheel = Get-ChildItem dist\keelrun_core-*.whl | Select-Object -First 1
          .venv-smoke\Scripts\pip.exe install --quiet --disable-pip-version-check $wheel.FullName
          .venv-smoke\Scripts\python.exe -c "import keel_core; c = keel_core.KeelCore(); c.configure({}); print('keel_core import OK:', c.report())"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-core-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  sdist-core:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/keel-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist-core
          path: dist/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 1b. The pure-Python `keel` front-end wheel (hatchling, platform-independent
  # — see python/keel/pyproject.toml). One build covers every platform.
  # ---------------------------------------------------------------------------
  wheel-frontend:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m pip install --upgrade pip build
      - run: python3 -m build --wheel --sdist --outdir dist python/keel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-frontend
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 1c. The `keel` CLI as a pip-installable wheel (maturin `bin` bindings —
  # crates/keel-cli/pyproject.toml, published as `keelrun-cli`) so
  # `uvx --from keelrun-cli keel run ...` "just works" from a wheel with no
  # Rust toolchain. Same platform matrix as the core wheels (macOS x2,
  # manylinux x2, Windows — added 2026-07-14, see wheels-core's comment);
  # `musl` CLI binaries are still produced separately by `cli-binaries` below
  # (raw static binaries for that libc variant, not wheels — pip/uvx have no
  # musl-specific concept, so those stay archive-only).
  # ---------------------------------------------------------------------------
  wheel-cli:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          # See wheels-core's comment: no free Intel macOS runner exists
          # anymore, so x86_64-apple-darwin is cross-compiled on the arm64
          # `macos-14` box.
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (linux/aarch64 cross build)
        if: runner.os == 'Linux' && matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build wheel (keel-cli, bin bindings)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist -m crates/keel-cli/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-cli-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  # The literal docs/sprint-plan.md release-gate spelling (`uvx keel run`)
  # needs the PyPI name `keel` itself — i.e. the `keelrun` front-end wheel
  # (wheel-frontend above), not this CLI wheel. This job proves the `uvx
  # --from` mechanism works against the actual published CLI wheel name,
  # `keelrun-cli`.
  cli-wheel-uvx-smoke:
    needs: wheel-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/download-artifact@v4
        with:
          name: wheel-cli-ubuntu-latest-x86_64
          path: dist
      - name: uvx --from ./dist/keelrun_cli-*.whl keel ...
        run: |
          set -euo pipefail
          uvx --from ./dist/keelrun_cli-*.whl keel --help
          uvx --from ./dist/keelrun_cli-*.whl keel --version
          out="$(uvx --from ./dist/keelrun_cli-*.whl keel explain KEEL-E011 --json)"
          echo "$out"
          echo "$out" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["code"] == "KEEL-E011", d'

  # ---------------------------------------------------------------------------
  # 2. napi native-addon prebuilds for `keel-core-native` (published as
  # `keelrun-core-native`, unscoped), staged into the per-platform npm layout
  # (node/keel-core-native/npm/<platform>/ — package.json's `napi` config +
  # optionalDependencies; see scripts/napi-prebuild.sh for why this doesn't
  # shell out to @napi-rs/cli). Then `npm pack` of the front-end package
  # (published as `keelrun`) for the tarball-install smoke test
  # (docs/dx-spec.md §6: "no toolchain, no compile, ever").
  # ---------------------------------------------------------------------------
  npm-native-prebuilds:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          # No free Intel macOS runner exists anymore (see wheels-core); both
          # darwin legs build on the arm64 `macos-14` box.
          - os: macos-14
            target: x86_64-apple-darwin
            platform_key: darwin-x64
            native: false # cross-compiled: an arm64 Node process can't dlopen an x86_64 addon
          - os: macos-14
            target: aarch64-apple-darwin
            platform_key: darwin-arm64
            native: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform_key: linux-x64-gnu
            native: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform_key: linux-arm64-gnu
            native: false # cross-compiled; can't execute on an x86_64 runner
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        # `rustup toolchain install` only makes 1.97.1 the override for THIS
        # directory (rust-toolchain.toml). That's not enough for any cargo
        # invocation that happens outside the checked-out repo tree — e.g.
        # npm-pack-root's `check-release-metadata.sh --full` pip-installs a
        # maturin sdist, which pip extracts and builds from /tmp/pip-req-build-*,
        # a directory with no rust-toolchain.toml of its own. Without an
        # explicit `rustup default`, that build fell back to whatever
        # rustup's machine-wide default was (1.96.1 on this runner image) and
        # failed keel-core-api/keel-journal/keelrun-core's `rust-version =
        # "1.97"` gate — hit for real running v0.1.0's release build
        # (2026-07-14). Setting the default explicitly closes that gap
        # everywhere, not just for known-affected jobs.
        run: |
          rustup toolchain install
          rustup default "$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install cross (linux/aarch64 cross build)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: rustup target add ${{ matrix.target }}
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: rustup target add "${{ matrix.target }}"
      - name: cargo build --target ${{ matrix.target }}
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build -p keel-node --release --locked --target "${{ matrix.target }}"
      - name: cross build --target ${{ matrix.target }}
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build -p keel-node --release --locked --target "${{ matrix.target }}"
      - name: Stage into node/keel-core-native/npm/${{ matrix.platform_key }}
        run: bash scripts/napi-prebuild.sh "${{ matrix.target }}"
      - name: Native conformance against the staged addon (host-arch legs only)
        if: matrix.native
        run: |
          set -euo pipefail
          cp "node/keel-core-native/npm/${{ matrix.platform_key }}/keelrun-core-native.${{ matrix.platform_key }}.node" \
            node/keel-core-native/keelrun-core-native.node
          (cd node/keel-core-native && node --test)
          rm node/keel-core-native/keelrun-core-native.node
      - name: npm pack the platform package
        # `--pack-destination` does not create the directory itself (hit for
        # real running v0.1.0's release build, 2026-07-14: ENOENT on the
        # .tgz path) — unlike npm-pack-root below, which already had this
        # mkdir.
        run: |
          mkdir -p "$RUNNER_TEMP/npm-dist"
          npm pack --pack-destination "$RUNNER_TEMP/npm-dist" "./node/keel-core-native/npm/${{ matrix.platform_key }}"
      - uses: actions/upload-artifact@v4
        with:
          name: npm-native-${{ matrix.platform_key }}
          path: ${{ runner.temp }}/npm-dist/*.tgz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2b. `keel` CLI binary prebuilds for npm (published as `keelrun-cli`, a
  # thin npm wrapper around the same binary `cli-binaries` below builds — see
  # node/keel-cli/ and scripts/cli-prebuild.sh). Same 5 platforms as
  # `cli-binaries`: musl Linux, not glibc — a CLI binary is a separate
  # process, not a native addon loaded into Node, so a static musl build
  # runs on glibc hosts too and no libc-specific package split is needed
  # (unlike npm-native-prebuilds' napi addon, which genuinely does need one).
  # ---------------------------------------------------------------------------
  npm-cli-prebuilds:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
            platform_key: darwin-x64
            cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            platform_key: darwin-arm64
            cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform_key: linux-x64-musl
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            platform_key: linux-arm64-musl
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform_key: win32-x64
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        # See npm-native-prebuilds's identical step for why this explicit
        # `rustup default` is needed on every job, not just known-affected
        # ones (hit for real running v0.1.0's release build, 2026-07-14).
        run: |
          rustup toolchain install
          rustup default "$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install cross (musl targets)
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: rustup target add ${{ matrix.target }}
        if: ${{ !matrix.cross }}
        run: rustup target add "${{ matrix.target }}"
      - name: cargo build --target ${{ matrix.target }}
        if: ${{ !matrix.cross }}
        run: cargo build -p keelrun-cli --release --locked --target "${{ matrix.target }}"
      - name: cross build --target ${{ matrix.target }}
        if: matrix.cross
        run: cross build -p keelrun-cli --release --locked --target "${{ matrix.target }}"
      - name: Stage into node/keel-cli/npm/${{ matrix.platform_key }}
        shell: bash
        run: bash scripts/cli-prebuild.sh "${{ matrix.target }}"
      - name: npm pack the platform package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/npm-dist"
          npm pack --pack-destination "$RUNNER_TEMP/npm-dist" "./node/keel-cli/npm/${{ matrix.platform_key }}"
      - uses: actions/upload-artifact@v4
        with:
          name: npm-cli-${{ matrix.platform_key }}
          path: ${{ runner.temp }}/npm-dist/*.tgz
          if-no-files-found: error

  npm-pack-root:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        # `rustup toolchain install` only makes 1.97.1 the override for THIS
        # directory (rust-toolchain.toml). That's not enough for any cargo
        # invocation that happens outside the checked-out repo tree — e.g.
        # npm-pack-root's `check-release-metadata.sh --full` pip-installs a
        # maturin sdist, which pip extracts and builds from /tmp/pip-req-build-*,
        # a directory with no rust-toolchain.toml of its own. Without an
        # explicit `rustup default`, that build fell back to whatever
        # rustup's machine-wide default was (1.96.1 on this runner image) and
        # failed keel-core-api/keel-journal/keelrun-core's `rust-version =
        # "1.97"` gate — hit for real running v0.1.0's release build
        # (2026-07-14). Setting the default explicitly closes that gap
        # everywhere, not just for known-affected jobs.
        run: |
          rustup toolchain install
          rustup default "$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Full release-metadata check (npm tarball smoke + python wheel + keelrun-core sdist compile)
        run: bash scripts/check-release-metadata.sh --full
      - name: npm pack keelrun (front end) + keelrun-core-native (source wrapper) + keelrun-cli (source wrapper)
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/npm-dist"
          npm pack --pack-destination "$RUNNER_TEMP/npm-dist" ./node/keel
          npm pack --pack-destination "$RUNNER_TEMP/npm-dist" ./node/keel-core-native
          npm pack --pack-destination "$RUNNER_TEMP/npm-dist" ./node/keel-cli
      - uses: actions/upload-artifact@v4
        with:
          name: npm-pack-root
          path: ${{ runner.temp }}/npm-dist/*.tgz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. `keel` CLI release binaries — architecture-spec.md NFR5: "a static Rust
  # binary (musl) for macOS/Linux/Windows". musl legs use `cross` (Docker
  # images with the musl toolchain preinstalled); rusqlite's `bundled` SQLite
  # (crates/keel-journal) compiles fine there and under MSVC (both are plain
  # `cc`-crate C compiles, no external SQLite dependency).
  # ---------------------------------------------------------------------------
  cli-binaries:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          # No free Intel macOS runner exists anymore (see wheels-core): both
          # darwin legs build on the arm64 `macos-14` box.
          # x86_64-apple-darwin is `rustup target add` + native `cargo build`
          # (Xcode cross-links it directly, no Docker/`cross` involved — that
          # tool doesn't support macOS targets anyway); Rosetta 2, preinstalled
          # on this runner, executes the resulting binary for the smoke test.
          - os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
            cross: false
            runnable: true
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            cross: false
            runnable: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            cross: true
            runnable: true # static musl binary; x86_64 host can run it directly
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            cross: true
            runnable: false # different CPU arch than the x86_64 runner
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            cross: false
            runnable: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        # `rustup toolchain install` only makes 1.97.1 the override for THIS
        # directory (rust-toolchain.toml). That's not enough for any cargo
        # invocation that happens outside the checked-out repo tree — e.g.
        # npm-pack-root's `check-release-metadata.sh --full` pip-installs a
        # maturin sdist, which pip extracts and builds from /tmp/pip-req-build-*,
        # a directory with no rust-toolchain.toml of its own. Without an
        # explicit `rustup default`, that build fell back to whatever
        # rustup's machine-wide default was (1.96.1 on this runner image) and
        # failed keel-core-api/keel-journal/keelrun-core's `rust-version =
        # "1.97"` gate — hit for real running v0.1.0's release build
        # (2026-07-14). Setting the default explicitly closes that gap
        # everywhere, not just for known-affected jobs.
        run: |
          rustup toolchain install
          rustup default "$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
      - name: Install cross (musl targets)
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: rustup target add ${{ matrix.target }}
        if: ${{ !matrix.cross }}
        run: rustup target add "${{ matrix.target }}"
      - name: cargo build --target ${{ matrix.target }}
        if: ${{ !matrix.cross }}
        run: cargo build -p keelrun-cli --release --locked --target "${{ matrix.target }}"
      - name: cross build --target ${{ matrix.target }}
        if: matrix.cross
        run: cross build -p keelrun-cli --release --locked --target "${{ matrix.target }}"
      - name: Smoke test (native-arch legs only)
        if: matrix.runnable && matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/keel"
          "$bin" --version
          out="$("$bin" explain KEEL-E011 --json)"
          echo "$out" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["code"] == "KEEL-E011", d'
      - name: Smoke test (Windows)
        if: matrix.runnable && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/keel.exe"
          & $bin --version
          $out = & $bin explain KEEL-E011 --json
          $out | ConvertFrom-Json | Select-Object -ExpandProperty code
      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          stage="keel-${{ needs.preflight.outputs.version }}-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/keel" "$stage/"
          cp LICENSE README.md "$stage/"
          tar czf "$stage.tar.gz" "$stage"
          shasum -a 256 "$stage.tar.gz" > "$stage.tar.gz.sha256"
      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "keel-${{ needs.preflight.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/keel.exe" -Destination $stage
          Copy-Item LICENSE,README.md -Destination $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          (Get-FileHash -Algorithm SHA256 "$stage.zip").Hash.ToLower() + "  $stage.zip" | Out-File -Encoding ascii "$stage.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            keel-*.tar.gz
            keel-*.tar.gz.sha256
            keel-*.zip
            keel-*.zip.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 4. Homebrew formula draft: syntax + style check always; on an actual tag,
  # additionally render the real url/sha256 from the tag's source tarball and
  # attach that rendered copy to the release (the checked-in
  # packaging/homebrew/keel.rb keeps a placeholder sha256 so it is
  # syntax-checkable without a tag exising — see scripts/render-homebrew-formula.sh).
  # ---------------------------------------------------------------------------
  homebrew-formula:
    needs: preflight
    runs-on: ubuntu-latest
    # Homebrew is deliberately out of scope for now (2026-07-14 decision,
    # local memory: keel-homebrew-skipped) — a hiccup here (e.g. GitHub's
    # tag-archive generation lagging the tag push) shouldn't block
    # draft-release/publish for the registries that actually matter.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: ruby -c (syntax)
        run: ruby -c packaging/homebrew/keel.rb
      - name: brew style (full lint, best-effort)
        run: brew style packaging/homebrew/keel.rb || echo "::warning::brew style reported issues (non-fatal for a draft formula)"
      - name: Render for this tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist-homebrew
          bash scripts/render-homebrew-formula.sh "$TAG" dist-homebrew/keel.rb
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: homebrew-formula
          path: dist-homebrew/keel.rb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 5. `cargo publish --dry-run` for the publishable crates, in dependency
  # order. `--no-verify` is required for the FIRST release of an
  # interdependent crate graph: dry-run verification otherwise tries to
  # resolve path dependencies (keel-core-api, keel-journal) against the
  # registry, which doesn't have them yet. This is advisory, not a hard gate —
  # continue-on-error, since a clean local `cargo package` (checked by
  # scripts/check-release-metadata.sh) is the meaningful signal pre-publish.
  # Crate names here are the in-repo `[package] name`s (post-rename): only
  # keel-core, keel-cli, and (fast-follow, 2026-07-14) the Rust front end
  # `crates/keel` were actually renamed (to keelrun-core/keelrun-cli/keelrun
  # — their plain names are taken on crates.io); keel-core-api, keel-journal,
  # and keel-macros are free and stay as-is (docs/naming-decision.md).
  # keel-macros must publish before keelrun (its path dependent).
  # ---------------------------------------------------------------------------
  cargo-publish-dry-run:
    needs: preflight
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        # `rustup toolchain install` only makes 1.97.1 the override for THIS
        # directory (rust-toolchain.toml). That's not enough for any cargo
        # invocation that happens outside the checked-out repo tree — e.g.
        # npm-pack-root's `check-release-metadata.sh --full` pip-installs a
        # maturin sdist, which pip extracts and builds from /tmp/pip-req-build-*,
        # a directory with no rust-toolchain.toml of its own. Without an
        # explicit `rustup default`, that build fell back to whatever
        # rustup's machine-wide default was (1.96.1 on this runner image) and
        # failed keel-core-api/keel-journal/keelrun-core's `rust-version =
        # "1.97"` gate — hit for real running v0.1.0's release build
        # (2026-07-14). Setting the default explicitly closes that gap
        # everywhere, not just for known-affected jobs.
        run: |
          rustup toolchain install
          rustup default "$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
      - name: cargo publish --dry-run (keel-core-api, keel-journal, keelrun-core, keelrun-cli, keel-macros, keelrun)
        run: |
          set -euo pipefail
          for crate in keel-core-api keel-journal keelrun-core keelrun-cli keel-macros keelrun; do
            echo "::group::cargo publish --dry-run -p $crate"
            cargo publish --dry-run --no-verify --locked -p "$crate"
            echo "::endgroup::"
          done

  # ---------------------------------------------------------------------------
  # 6. File (or update) a DRAFT GitHub Release with every artifact above.
  # Tag pushes only — workflow_dispatch dry runs stop after building/smoking.
  # ---------------------------------------------------------------------------
  draft-release:
    needs:
      - preflight
      - wheels-core
      - sdist-core
      - wheel-frontend
      - wheel-cli
      - cli-wheel-uvx-smoke
      - npm-native-prebuilds
      - npm-cli-prebuilds
      - npm-pack-root
      - cli-binaries
      - homebrew-formula
      - cargo-publish-dry-run
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten + checksum
        run: |
          set -euo pipefail
          find dist -mindepth 2 -type f -exec mv -t dist {} +
          find dist -mindepth 1 -type d -empty -delete
          (cd dist && shasum -a 256 -- * > SHA256SUMS.txt)
          ls -la dist
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: keel ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: dist/*

  # ---------------------------------------------------------------------------
  # 7. Real publishing. Gated on workflow_dispatch's `publish` input so it
  # never runs from a plain tag push — you must explicitly dispatch this
  # workflow against the release tag with `publish: true`.
  #
  # PyPI uses Trusted Publishing (OIDC) — no stored token — via three
  # separate jobs below, ONE PER PROJECT. This isn't a style choice: PyPI
  # rejects registering a second "pending" publisher (Account -> Publishing)
  # for a project that doesn't exist yet if its (repo, workflow, environment)
  # triple exactly matches one already registered for a DIFFERENT pending
  # project — "A pending trusted publisher matching this configuration has
  # already been registered for a different project name" (hit this
  # 2026-07-14 registering keelrun/keelrun-cli after keelrun-core). Since
  # `environment:` is a job-level GitHub Actions setting, giving each project
  # a distinct environment name requires a distinct job. Registrations:
  #   keelrun-core -> owner MisterTK, repo keel, workflow release.yml, environment `release`
  #   keelrun      -> same repo/workflow,                              environment `pypi-keelrun`
  #   keelrun-cli  -> same repo/workflow,                              environment `pypi-keelrun-cli`
  # PyPI creates each project on its first successful publish from that
  # exact identity — see docs.pypi.org/trusted-publishers. `dist/` also holds
  # npm tarballs, CLI archives, and the homebrew formula from the other jobs,
  # so each job stages only its own Python files into a private directory
  # first (`pypa/gh-action-pypi-publish` uploads everything in
  # `packages-dir`, no per-file filtering).
  #
  # npm still uses a stored token (`NPM_TOKEN` repo secret, provisioned
  # 2026-07-14) in its own job below — node/keel-core-native's + its npm/*/
  # platform packages' `"private": true` must be flipped to `false` before
  # those steps succeed.
  #
  # crates.io is deliberately NOT included here: keel-core-api, keel-journal,
  # keelrun-core, and keelrun-cli v0.1.0 were already published manually
  # (docs/naming-decision.md, 2026-07-14) via a locally-provisioned
  # `cargo login` token — re-running `cargo publish` for a version that
  # already exists fails immediately. Add the crates.io steps back as their
  # own job for the *next* version bump — order matters (keel-core-api,
  # keel-journal, then keelrun-core, then keelrun-cli — the same order
  # cargo-publish-dry-run uses above) — with a `CARGO_REGISTRY_TOKEN` secret
  # provisioned as a repo secret at that point (today it's local-only,
  # deliberately not added to CI to avoid exactly this kind of
  # double-publish footgun until it's needed).
  # ---------------------------------------------------------------------------
  publish-pypi-keelrun-core:
    needs: draft-release
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true
    runs-on: ubuntu-latest
    environment: release # matches keelrun-core's pending-publisher registration
    permissions:
      contents: read
      id-token: write # mandatory for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten downloaded artifacts (same as draft-release)
        run: |
          set -euo pipefail
          find dist -mindepth 2 -type f -exec mv -t dist {} +
          find dist -mindepth 1 -type d -empty -delete
      - name: Stage keelrun-core distributions
        run: |
          set -euo pipefail
          mkdir -p pypi-dist
          cp dist/keelrun_core-*.whl dist/keelrun_core-*.tar.gz pypi-dist/
          ls -la pypi-dist
      - name: Publish to PyPI (Trusted Publishing)
        # Pinned to a commit SHA, not the `release/v1` branch tag: unlike this
        # file's other `uses:` (tags from actions/, PyO3/, etc.), `release/v1`
        # is a mutable branch, and this step runs with `id-token: write` and
        # direct PyPI publish capability — meaningfully higher supply-chain
        # stakes than the build-only steps elsewhere in this workflow.
        # SHA is release/v1's tip as of 2026-07-14; bump deliberately (e.g. via
        # Dependabot's github-actions ecosystem) rather than silently drifting.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1, 2026-07-14
        with:
          packages-dir: pypi-dist
          # Makes re-running this workflow for the same version idempotent:
          # without this, a re-run after e.g. the npm leg failing would also
          # re-attempt already-succeeded PyPI uploads and get a hard "file
          # already exists" error instead of a clean skip.
          skip-existing: true

  publish-pypi-keelrun-cli:
    needs: draft-release
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true
    runs-on: ubuntu-latest
    environment: pypi-keelrun-cli # matches keelrun-cli's pending-publisher registration
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten downloaded artifacts (same as draft-release)
        run: |
          set -euo pipefail
          find dist -mindepth 2 -type f -exec mv -t dist {} +
          find dist -mindepth 1 -type d -empty -delete
      - name: Stage keelrun-cli distributions
        run: |
          set -euo pipefail
          mkdir -p pypi-dist
          cp dist/keelrun_cli-*.whl pypi-dist/
          ls -la pypi-dist
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1, 2026-07-14
        with:
          packages-dir: pypi-dist
          # Makes re-running this workflow for the same version idempotent:
          # without this, a re-run after e.g. the npm leg failing would also
          # re-attempt already-succeeded PyPI uploads and get a hard "file
          # already exists" error instead of a clean skip.
          skip-existing: true

  # Not a technical requirement (PyPI doesn't check cross-project
  # dependencies at publish time — only at install time), but `needs:
  # publish-pypi-keelrun-core` keeps the run order matching keelrun's actual
  # dependency on keelrun-core==<version>, so a partial-failure run leaves
  # the more obviously-broken state (keelrun without its core) less likely.
  publish-pypi-keelrun:
    needs: [draft-release, publish-pypi-keelrun-core]
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true
    runs-on: ubuntu-latest
    environment: pypi-keelrun # matches keelrun's pending-publisher registration
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten downloaded artifacts (same as draft-release)
        run: |
          set -euo pipefail
          find dist -mindepth 2 -type f -exec mv -t dist {} +
          find dist -mindepth 1 -type d -empty -delete
      - name: Stage keelrun distributions
        run: |
          set -euo pipefail
          mkdir -p pypi-dist
          cp dist/keelrun-*.whl dist/keelrun-*.tar.gz pypi-dist/
          ls -la pypi-dist
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1, 2026-07-14
        with:
          packages-dir: pypi-dist
          # Makes re-running this workflow for the same version idempotent:
          # without this, a re-run after e.g. the npm leg failing would also
          # re-attempt already-succeeded PyPI uploads and get a hard "file
          # already exists" error instead of a clean skip.
          skip-existing: true

  publish-npm:
    needs: draft-release
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true
    runs-on: ubuntu-latest
    environment: release # no protection rules configured (2026-07-14 decision) — workflow_dispatch's `publish: true` input is the only gate
    permissions:
      contents: read
      id-token: write # mandatory for npm provenance attestations (OIDC), same GitHub Actions token PyPI Trusted Publishing above uses
    steps:
      - uses: actions/checkout@v4
      # Required for npm auth: setup-node's `registry-url` writes an .npmrc
      # entry (`//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`) that
      # npm publish reads from. Setting the NODE_AUTH_TOKEN env var alone,
      # with no .npmrc pointing at it, does nothing — npm publish failed with
      # ENEEDAUTH without this step (hit for real running v0.1.0's release,
      # 2026-07-14).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten downloaded artifacts (same as draft-release)
        run: |
          set -euo pipefail
          find dist -mindepth 2 -type f -exec mv -t dist {} +
          find dist -mindepth 1 -type d -empty -delete
          ls -la dist

      # npm (platform packages + the root native wrapper first, so the front
      # end's optionalDependency resolution has something to find; flip
      # `"private": true` -> `false` in each package.json before this can
      # succeed). `keelrun-core-native-*.tgz` matches both the 4 per-platform
      # tarballs and the root `keelrun-core-native-<version>.tgz` wrapper —
      # all of them publish the same way. `keelrun-cli-*.tgz` is the same
      # shape for the CLI's platform packages + root wrapper. The front-end
      # pattern is `keelrun-[0-9]*.tgz` (version starts right after the
      # hyphen), not `keelrun-*.tgz`, so it does NOT also match either
      # `-core-native-`/`-cli-` family and double-publish them.
      #
      # Every path passed to `npm publish` is prefixed `./` deliberately:
      # `npm publish dist/foo.tgz` (no leading `./`) hit npm-package-arg's
      # hosted-git-shorthand heuristic instead of being read as a local file
      # — it tried `git ls-remote ssh://git@github.com/dist/foo.tgz.git` and
      # failed with a bogus "Permission denied (publickey)" (hit for real
      # running v0.1.0's release, 2026-07-14).
      #
      # Idempotent per-package (mirrors the PyPI jobs' `skip-existing:
      # true`): `npm view <name>@<version>` before publishing, skip if it
      # already resolves. Needed for real, not just defensively — the first
      # v0.1.1 run hit npm's automated spam-detection heuristic on one
      # brand-new platform package (`keelrun-cli-win32-x64`, a 403 with no
      # retry-after signal, and NOT a burst-rate fluke: it recurred
      # identically on a from-scratch re-run ~10 hours later, so this is a
      # persistent block on that specific name, not something a retry
      # fixes — resolving it needs an npm support request from the account
      # owner, https://www.npmjs.com/support).
      #
      # Best-effort, not fail-fast: each package is attempted independently
      # (`|| record_failure`, not bare `set -e`) so one package's permanent
      # 403 can never again block every OTHER package in the same job —
      # exactly what happened the first time, when the win32-x64 403 under
      # plain `set -e` aborted the step before the front-end `keelrun`
      # package's publish was even attempted. The step still fails overall
      # (non-zero exit) if anything genuinely failed, so CI stays honest —
      # it just doesn't let one bad package take the rest down with it.
      - run: |
          set -uo pipefail
          failures=()
          publish_if_missing() {
            local tgz="$1"
            local pkg
            pkg="$(tar -xOzf "$tgz" package/package.json | node -e '
              const p = JSON.parse(require("fs").readFileSync(0, "utf8"));
              console.log(p.name + "@" + p.version);
            ')"
            if npm view "$pkg" version >/dev/null 2>&1; then
              echo "already published: $pkg (skipping)"
            elif npm publish --provenance --access public "./$tgz"; then
              echo "published: $pkg"
            else
              echo "::error::failed to publish $pkg"
              failures+=("$pkg")
            fi
          }
          for tgz in dist/keelrun-core-native-*.tgz; do
            publish_if_missing "$tgz"
          done
          for tgz in dist/keelrun-cli-*.tgz; do
            publish_if_missing "$tgz"
          done
          shopt -s nullglob
          front_end=(dist/keelrun-[0-9]*.tgz)
          if [ "${#front_end[@]}" -ne 1 ]; then
            echo "::error::expected exactly one keelrun front-end tarball, found ${#front_end[@]}: ${front_end[*]}"
            failures+=("keelrun (tarball count mismatch)")
          else
            publish_if_missing "${front_end[0]}"
          fi
          if [ "${#failures[@]}" -ne 0 ]; then
            echo "::error::${#failures[@]} package(s) failed to publish: ${failures[*]}"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
