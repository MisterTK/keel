name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # contracts/ is frozen: changes land only through an approved
  # contract-change request (CCR), signalled by the PR label below.
  contract-freeze:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if contracts/ changed without CCR approval
        env:
          APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'contract-change-approved') }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=50
          CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD -- contracts/ | wc -l)
          if [ "$CHANGED" -gt 0 ] && [ "$APPROVED" != "true" ]; then
            echo "::error::contracts/ changed without the 'contract-change-approved' label."
            echo "File a contract-change request (see contracts/README.md); the orchestrator applies the label on approval."
            git diff --name-only "origin/$BASE_REF"...HEAD -- contracts/
            exit 1
          fi
          echo "contracts/ unchanged or change approved."

  # NFR6 (architecture-spec.md §1.2): no copyleft/BSL contamination from
  # dependencies in the core path. cargo-deny enforces the Rust license/bans/
  # advisories/sources graph (deny.toml); the two check-licenses scripts cover
  # the front ends' "zero runtime dependencies" invariant (engineering-manifesto
  # rule 12) and allowlist their test-only dev dependencies.
  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      # Pinned exactly (not `--locked` against a floating latest) so this job's
      # pass/fail is reproducible independent of when cargo-deny last released.
      - name: Install cargo-deny 0.20.2 (pinned)
        run: cargo install cargo-deny --version 0.20.2 --locked
      - name: cargo deny check (licenses, bans, advisories, sources)
        run: cargo deny check
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python front end + stub — zero-dep / dev-dependency license check
        run: python3 scripts/check-licenses.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Node front end + stub/native — zero-dep / dev-dependency license check
        run: node scripts/check-licenses.mjs

  # Real core + stub conformance + FFI + CLI + Tier 2 all ride `cargo test --all`.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --all --locked
      - name: Conformance (Rust stub, verbose)
        run: cargo test -p keel-core-stub --test conformance -- --nocapture
      - name: Conformance (real core — Tier 1 + Tier 2 16-17)
        run: cargo test -p keelrun-core --test conformance --test flows_conformance -- --nocapture

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Conformance (Python stub)
        run: python3 conformance/runner.py
      - name: Policy schema check
        run: |
          pip install jsonschema
          python3 conformance/check_schema.py
      - name: Journal fixtures build
        run: python3 conformance/fixtures/journal/build_fixtures.py
      - name: faultproxy sequencing
        run: python3 tools/faultproxy/test_faultproxy.py

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Conformance (Node stub)
        working-directory: node/keel-core-stub
        run: node --test

  # Python FRONT-END suite (import hook, adapters, llm packs, flows, demos). Runs
  # on the pure-Python stub (no wheel here); native-only legs skip cleanly.
  python-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install adapter deps (httpx + requests)
        run: python3 -m pip install --upgrade pip httpx requests
      - name: Front-end suite (stub; native legs skip without the wheel)
        working-directory: python/keel
        run: python3 -m unittest discover

  # Node FRONT-END suite (loader, fetch, ai-sdk/mcp/llm packs, node-service demo).
  node-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Front-end suite
        working-directory: node/keel
        run: node --test

  # ≤10µs overhead (DX invariant 8), published as a downloadable artifact.
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Overhead benchmark → target/bench-overhead.json
        run: bash scripts/bench-overhead.sh
      - uses: actions/upload-artifact@v4
        with:
          name: bench-overhead
          path: target/bench-overhead.json

  # Build smoke for the Python native module (build only; no publish).
  maturin-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
      - name: maturin build (keel_core, build only)
        run: |
          python3 -m pip install --upgrade pip maturin
          maturin build -m crates/keel-py/Cargo.toml

  # Build smoke for the napi addon (build only; compiles the cdylib).
  napi-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: cargo build keel-node (build only)
        run: cargo build -p keel-node --locked

  # Native conformance + native front-end legs. Builds the wheel into a venv, so
  # it is heavier — intended to be a NON-REQUIRED check (set in branch protection,
  # not here). The required gate is `rust`, which runs the real core 17/17.
  native-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
      - name: Build native keel_core, run native conformance + front-end legs
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip maturin httpx requests
          maturin develop -m crates/keel-py/Cargo.toml
          python3 conformance/runner.py --impl native
          (cd python/keel && python3 -m unittest discover)

  # Node native leg (the twin of `native-conformance` for Python). Builds the
  # napi addon so node/keel-core-native discovers it in target/release, then runs
  # the native Node conformance (17 scenarios against the addon) AND the front-end
  # suite with the native-gated legs (ai-sdk/mcp/journal/persistent-cache) live —
  # they auto-skip in the stub `node-frontend` job. NON-REQUIRED (heavier build):
  # the required Node gate stays the stub `node` + `node-frontend` jobs.
  node-native-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: Swatinem/rust-cache@v2
      - name: Build the napi addon (keel-core-native)
        run: cargo build -p keel-node --release --locked
      - name: Native Node conformance (addon) + async bridge
        working-directory: node/keel-core-native
        run: node --test
      - name: Node front-end suite on the native core (native legs run)
        working-directory: node/keel
        run: node --test

  # DX invariant 8 (second half): `keel run` adds <100ms to process startup at
  # p50. Runs the existing StartupBudgetTest and echoes the measured deltas into
  # the job summary. Publishing the number in the README stays a deliberate manual
  # step (kept honest — CI measures, the README is updated on purpose). Timing on
  # shared runners is noisy, so the test's own assert budget is generous (250ms)
  # and this is a NON-REQUIRED check; the number in the summary is the signal.
  startup-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Measure `keel run` startup overhead (no wheel → native leg skips)
        working-directory: python/keel
        run: |
          status=0
          python3 -m unittest tests.test_run.StartupBudgetTest -v > budget.log 2>&1 || status=$?
          cat budget.log
          {
            echo "### \`keel run\` startup budget (DX invariant 8)"
            echo ""
            echo '```'
            grep -F "[startup budget]" budget.log || echo "(no measurement line captured)"
            echo '```'
            echo ""
            echo "_Target <100ms at p50; publishing this number in the README is a manual step._"
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status

  # DX invariant 8 (Node half): `node --import keelrun/hook` adds <100ms to
  # process startup at p50. Mirrors the Python `startup-budget` job above
  # exactly: run the guard test, echo the measured deltas into the job
  # summary, same generous 250ms budget / NON-REQUIRED reasoning (shared
  # runners are noisy; the printed number is the signal).
  node-startup-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Measure `node --import keelrun/hook` startup overhead (no addon → native leg skips)
        working-directory: node/keel
        run: |
          status=0
          node --test test/startup-budget.test.mjs > budget.log 2>&1 || status=$?
          cat budget.log
          {
            echo "### \`node --import keelrun/hook\` startup budget (DX invariant 8)"
            echo ""
            echo '```'
            grep -F "[startup budget]" budget.log || echo "(no measurement line captured)"
            echo '```'
            echo ""
            echo "_Target <100ms at p50; publishing this number in the README is a manual step._"
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status

  # Guard the optional `otel` feature against silent rot and prove it is reachable
  # from a shipped artifact. Builds + clippy keel-core with `--features otel`, and
  # builds the two native front-end crates with their forwarded `otel` feature —
  # the exact build a user makes to get span export. Compile/link only (no live
  # OTLP collector in CI); activation is `KEEL_OTEL=1` at runtime (see README).
  # Without this job the exporter code is unguarded and can silently stop
  # compiling. NON-REQUIRED (off-by-default feature).
  otel-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup toolchain install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # keel-py links libpython under a non-wheel build
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p keelrun-core --features otel --all-targets --locked -- -D warnings
      - run: cargo build -p keel-node --features otel --locked
      - run: cargo build -p keel-py --features otel --locked
